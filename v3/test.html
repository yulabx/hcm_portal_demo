<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Enterprise Nexus v8</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════════════════════════════════
   MODERN TOKENS
═══════════════════════════════════ */
        :root {
            --sidebar-w: 240px;
            --bg: #f8fafc;
            --panel: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-dim: #64748b;
            --primary: #2563eb;
            --primary-light: #eff6ff;

            --ded: #3b5bdb;
            --shr: #0d9488;
            --r-lg: 16px;
            --r-md: 10px;
            --sh: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* ═══════════════════════════════════
   SIDEBAR
═══════════════════════════════════ */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--panel);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            padding: 0 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            color: #fff;
            display: grid;
            place-items: center;
            font-weight: 700;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--r-md);
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-dim);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .nav-item:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* ═══════════════════════════════════
   CONTENT
═══════════════════════════════════ */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 40px;
            max-width: 1400px;
        }

        .header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .view-section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .glass-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 24px;
            box-shadow: var(--sh);
            transition: 0.3s;
            cursor: pointer;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        /* Logic Components */
        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .b-blue {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .b-teal {
            background: #f0fdfa;
            color: #0d9488;
        }

        .res-row {
            margin-top: 16px;
        }

        .res-track {
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 6px;
        }

        .res-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease;
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">C</div>
            <div style="font-weight: 700; font-size: 18px">Nexus Hub</div>
        </div>
        <div class="nav-item active" onclick="switchView('pool')" id="ni-pool">📦 資源池維度</div>
        <div class="nav-item" onclick="switchView('proj')" id="ni-proj">📁 專案維度</div>
    </aside>

    <main class="main">
        <header class="header">
            <div>
                <p id="bc"
                    style="color:var(--text-dim); font-size:12px; margin-bottom:4px; font-family:'JetBrains Mono'">
                    Dimension / Infrastructure</p>
                <h1 class="page-title" id="page-title">資源池總覽</h1>
            </div>
            <div id="actions"></div>
        </header>

        <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:16px; margin-bottom:32px" id="kpi-box"></div>

        <section id="view-pool" class="view-section active">
            <div class="card-grid" id="pool-grid"></div>
        </section>

        <section id="view-proj" class="view-section">
            <div
                style="background:var(--panel); border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden">
                <table style="width:100%; border-collapse:collapse; text-align:left">
                    <thead
                        style="background:#f8fafc; color:var(--text-dim); font-size:12px; border-bottom:1px solid var(--border)">
                        <tr>
                            <th style="padding:16px 24px">專案 ID / 名稱</th>
                            <th>部署環境</th>
                            <th>分佈池數</th>
                            <th>CPU 消耗</th>
                            <th>RAM 消耗</th>
                        </tr>
                    </thead>
                    <tbody id="proj-table"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        /* ─── 完整資料物件 (100% 同步自 v7) ─── */
        const CLOUD_META = {
            private: { label: '私有雲', color: '#2563eb' },
            hicloud: { label: 'hiCloud', color: '#0891b2' },
            aws: { label: 'AWS', color: '#d97706' }
        };

        const SITES = {
            private: [
                { id: 'tp-main', name: '台北主中心', region: '台北', pools: ['P01', 'P02', 'S01'], cpu: { used: 200, total: 340 }, mem: { used: 500, total: 768 } },
                { id: 'tc-dr', name: '台中異備中心', region: '台中', pools: ['P03', 'P04', 'S02'], cpu: { used: 110, total: 200 }, mem: { used: 208, total: 512 } }
            ],
            hicloud: [
                { id: 't7-main', name: '東七主中心', region: '台北', pools: ['P05', 'P06', 'P07', 'P08', 'S03'], cpu: { used: 160, total: 300 }, mem: { used: 400, total: 600 } }
            ],
            aws: [
                { id: 't-main', name: '台灣主中心', region: '台北', pools: ['P09', 'P10'], cpu: { used: 80, total: 160 }, mem: { used: 192, total: 384 } }
            ]
        };

        const POOLS = {
            P01: { name: '電發生產環境-01', type: 'dedicated', env: 'Prod', role: 'primary', cpu: { used: 32, total: 32 } },
            P02: { name: '電發測試環境-01', type: 'dedicated', env: 'UAT', role: 'primary', cpu: { used: 16, total: 16 } },
            S01: { name: '共用私有雲主中心', type: 'shared', env: 'Prod', role: 'primary', cpu: { used: 128, total: 256 } }
        };

        const PROJ_DATA = {
            power: { name: '電發專案', id: 'PRJ-POWER', env: 'Prod', pools: ['P01', 'P02', 'P03', 'P04', 'P05', 'P06', 'P09', 'P10'], cpu: 240, mem: 480 },
            dept1: { name: '一科', id: 'PRJ-1', env: 'Prod', pools: ['S01', 'S02'], cpu: 64, mem: 128 },
            dept2: { name: '二科', id: 'PRJ-2', env: 'Prod', pools: ['S01'], cpu: 32, mem: 64 }
        };

        /* ─── 控制邏輯 ─── */
        function init() {
            renderKPI();
            renderClouds();
        }

        function switchView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.getElementById('ni-' + v).classList.add('active');
            document.getElementById('page-title').innerText = v === 'pool' ? '資源池總覽' : '專案資源維度';
            if (v === 'proj') renderProjects(); else renderClouds();
        }

        function renderKPI() {
            const kpis = [
                { l: '專案總數', v: 5 }, { l: '雲端站點', v: 4 }, { l: '資源池', v: 13 }, { l: '總核心數', v: 1000 }, { l: '運行狀態', v: 'Normal' }
            ];
            document.getElementById('kpi-box').innerHTML = kpis.map(k => `
    <div style="background:#fff; padding:20px; border:1px solid var(--border); border-radius:var(--r-md)">
      <div style="font-size:24px; font-weight:700; font-family:'JetBrains Mono'">${k.v}</div>
      <div style="font-size:11px; color:var(--text-dim); font-weight:600; text-transform:uppercase">${k.l}</div>
    </div>
  `).join('');
        }

        function renderClouds() {
            const container = document.getElementById('pool-grid');
            container.innerHTML = Object.entries(CLOUD_META).map(([id, meta]) => `
    <div class="glass-card" onclick="drillCloud('${id}')">
      <div style="display:flex; justify-content:space-between; margin-bottom:16px">
        <h3 style="font-weight:700">${meta.label}</h3>
        <span class="badge b-blue">Active</span>
      </div>
      <div style="font-size:12px; color:var(--text-dim)">隸屬站點：${SITES[id].length} 個</div>
      <div class="res-row">
        <div class="res-track"><div class="res-fill" style="width:65%; background:${meta.color}"></div></div>
      </div>
    </div>
  `).join('');
            document.getElementById('actions').innerHTML = "";
        }

        function drillCloud(cid) {
            const sites = SITES[cid];
            const container = document.getElementById('pool-grid');
            document.getElementById('bc').innerText = `Dimension / ${CLOUD_META[cid].label}`;

            container.innerHTML = sites.map(s => `
    <div class="glass-card">
      <h3 style="margin-bottom:12px">${s.name}</h3>
      <div style="font-family:'JetBrains Mono'; font-size:12px; color:var(--text-dim)">${s.region} · ${s.pools.length} Pools</div>
      <div class="res-row">
        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px"><span>CPU Usage</span><span>${s.cpu.used} / ${s.cpu.total}</span></div>
        <div class="res-track"><div class="res-fill" style="width:${(s.cpu.used / s.cpu.total) * 100}%; background:var(--primary)"></div></div>
      </div>
    </div>
  `).join('');

            document.getElementById('actions').innerHTML = `<button onclick="renderClouds()" style="padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:#fff; cursor:pointer">← 返回雲端</button>`;
        }

        function renderProjects() {
            const table = document.getElementById('proj-table');
            table.innerHTML = Object.values(PROJ_DATA).map(p => `
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:18px 24px"><strong>${p.name}</strong><br><small style="color:var(--text-dim)">${p.id}</small></td>
      <td><span class="badge b-blue">${p.env}</span></td>
      <td><code style="font-size:11px">${p.pools.join(', ')}</code></td>
      <td><strong>${p.cpu}</strong> Core</td>
      <td><strong>${p.mem}</strong> GB</td>
    </tr>
  `).join('');
        }

        window.onload = init;
    </script>
</body>

</html>
