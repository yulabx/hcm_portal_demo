<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申請 VM — 雲地整合平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind-config.js"></script>
  <script src="menu.js"></script>
  <script src="sidebar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
    .vm-row-new { animation:slideIn .25s ease both; }

    input:focus, select:focus, textarea:focus {
      outline:none;
      border-color:#ea580c;
      box-shadow:0 0 0 3px rgba(234,88,12,.1);
    }

    /* VM table */
    .vm-tbl { width:100%; border-collapse:collapse; font-size:12px; }
    .vm-tbl th {
      text-align:left; padding:8px 10px;
      background:#f7f8fa; color:#737373; font-size:10px; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase;
      border-bottom:1px solid #e8e8e8;
    }
    .vm-tbl td { padding:9px 10px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
    .vm-tbl tr:last-child td { border-bottom:none; }
    .vm-tbl tr:hover td { background:#fafafa; }

    .dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; vertical-align:middle; }
    .dot-run { background:#16a34a; }
    .dot-stop { background:#a3a3a3; }

    .badge { display:inline-flex; align-items:center; padding:2px 7px; border-radius:99px; font-size:10px; font-weight:700; }
    .b-run  { background:#f0fdf4; color:#16a34a; }
    .b-stop { background:#f5f5f5; color:#737373; }
    .b-prod { background:#eff6ff; color:#2563eb; }
    .b-uat  { background:#f5f3ff; color:#7c3aed; }
    .b-ded  { background:#eff6ff; color:#2563eb; }
    .b-shr  { background:#f0fdfa; color:#0d9488; }

    /* Pool card */
    .pool-card { background:#fff; border:1px solid #e8e8e8; border-radius:10px; overflow:hidden; }
    .pool-header { padding:14px 16px; border-bottom:1px solid #f0f0f0; display:flex; align-items:center; gap:10px; }
    .pool-body { padding:0; }

    /* Progress bar */
    .res-bar { height:4px; background:#f0f0f0; border-radius:2px; overflow:hidden; }
    .res-fill { height:100%; border-radius:2px; transition:width .3s; }
    .fill-grn { background:#16a34a; }
    .fill-amb { background:#d97706; }
    .fill-red { background:#dc2626; }

    /* Resource hint */
    .res-hint { font-size:11px; }
    .res-ok   { color:#16a34a; }
    .res-warn { color:#d97706; }
    .res-err  { color:#dc2626; font-weight:600; }

    /* Confirm dialog overlay */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:50; display:flex; align-items:center; justify-content:center; }

    /* Toast */
    #toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
      background:#0f0f0f; color:#fff; font-size:12px; font-weight:600;
      padding:9px 20px; border-radius:8px; z-index:99;
      opacity:0; transition:opacity .2s; pointer-events:none;
    }
    #toast.show { opacity:1; }
  </style>
</head>
<body class="text-ink text-sm font-sans flex flex-col min-h-screen">

<!-- ══ TOP BAR ══ -->
<header class="h-[52px] bg-white border-b border-bord flex items-center pr-4 sticky top-0 z-30 flex-shrink-0 shadow-sm">
  <div class="tb-brand flex items-center gap-2.5 px-4 border-r border-bord h-full w-[220px] flex-shrink-0 overflow-hidden transition-all duration-250">
    <div class="w-7 h-7 bg-or rounded-[6px] flex items-center justify-center text-white font-mono text-[10px] font-bold flex-shrink-0">HCM</div>
    <div class="brand-text overflow-hidden transition-all duration-250">
      <div class="text-sm font-extrabold tracking-tight whitespace-nowrap">雲地整合平台</div>
      <div class="text-[10px] text-ink-4 font-mono whitespace-nowrap">INFRA PORTAL</div>
    </div>
  </div>
  <div class="flex-1 flex items-center px-5 gap-2">
    <span class="text-sm font-bold tracking-tight">申請 VM</span>
  </div>
  <div class="flex items-center gap-2">
    <!-- 環境篩選 -->
    <div class="flex border border-bord rounded-[6px] overflow-hidden text-xs font-semibold">
      <button onclick="setEnvFilter('all')" id="ef-all" class="px-3 py-1.5 bg-or text-white transition-colors">全部</button>
      <button onclick="setEnvFilter('Prod')" id="ef-prod" class="px-3 py-1.5 bg-white text-ink-3 hover:bg-surf-2 transition-colors">Prod</button>
      <button onclick="setEnvFilter('UAT')" id="ef-uat" class="px-3 py-1.5 bg-white text-ink-3 hover:bg-surf-2 transition-colors">UAT</button>
    </div>
    <div class="w-[30px] h-[30px] rounded-full bg-gradient-to-br from-ded to-shr flex items-center justify-center text-white text-[11px] font-bold">用</div>
  </div>
</header>

<!-- ══ APP BODY ══ -->
<div class="flex flex-1 min-h-0 overflow-hidden" id="appBody">

  <!-- ── SIDEBAR ── -->
  <div id="sidebar-root" data-active="vm"></div>

  <!-- ── MAIN ── -->
  <main class="flex-1 overflow-auto p-6" id="mainContent">

    <!-- 說明列 -->
    <div class="mb-5 flex items-center justify-between">
      <div>
        <div class="text-[13px] font-bold text-ink-2">我的 Pool 與 VM 管理</div>
        <div class="text-[11px] text-ink-4 mt-0.5">在已取得的 Pool 內建立、管理虛擬機器</div>
      </div>
      <div class="text-[11px] text-ink-4 bg-white border border-bord rounded-[6px] px-3 py-1.5">
        模擬使用者：<span class="font-semibold text-ink-2">電發專案</span>
      </div>
    </div>

    <!-- Pool 卡片列表 -->
    <div class="flex flex-col gap-5" id="poolList"></div>

  </main>
</div>

<!-- ══ 新增 VM MODAL ══ -->
<div id="vmModal" class="overlay hidden" onclick="closeModal(event)">
  <div class="modal-in bg-white rounded-xl shadow-2xl w-full max-w-[520px] mx-4 overflow-hidden" onclick="event.stopPropagation()">
    <!-- Modal Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-bord">
      <div>
        <div class="font-bold text-[15px]">新增 VM</div>
        <div class="text-[11px] text-ink-4 mt-0.5" id="modal-pool-name">—</div>
      </div>
      <button onclick="closeModal()" class="w-7 h-7 flex items-center justify-center text-ink-4 hover:text-ink hover:bg-surf-2 rounded-[6px] transition-colors text-lg leading-none">×</button>
    </div>

    <!-- Modal Body -->
    <div class="px-6 py-5 flex flex-col gap-4 max-h-[72vh] overflow-y-auto">

      <!-- Shared Pool：選擇系統配額 -->
      <div id="alloc-row" class="hidden">
        <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">系統配額 <span class="text-red">*</span></label>
        <select id="f-alloc" onchange="onAllocChange()" class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm bg-white">
          <option value="">— 選擇系統配額 —</option>
        </select>
        <div id="alloc-quota-hint" class="mt-1.5 hidden text-[11px] text-ink-4 bg-surf-2 rounded-[6px] px-3 py-2 flex gap-4 flex-wrap">
          <span>CPU 剩餘: <span id="aq-cpu" class="font-mono font-semibold text-ink-2">—</span></span>
          <span>Mem 剩餘: <span id="aq-mem" class="font-mono font-semibold text-ink-2">—</span></span>
          <span>Disk 剩餘: <span id="aq-disk" class="font-mono font-semibold text-ink-2">—</span></span>
        </div>
      </div>

      <!-- VM 名稱 & 主機名稱 -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">VM 名稱 <span class="text-red">*</span></label>
          <input id="f-name" type="text" placeholder="vm-prod-web-01"
            class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm">
          <div class="text-[10px] text-ink-4 mt-1">英數字、連字符</div>
        </div>
        <div>
          <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">主機名稱 <span class="text-ink-4 font-normal normal-case">(選填)</span></label>
          <input id="f-hostname" type="text" placeholder="預設同 VM 名稱"
            class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm">
        </div>
      </div>

      <!-- 規格套餐 -->
      <div>
        <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">規格套餐 <span class="text-red">*</span></label>
        <select id="f-flavor" onchange="onFlavorChange()" class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm bg-white font-mono">
          <option value="">— 選擇規格 —</option>
        </select>
        <!-- 自訂規格（私有雲專用） -->
        <div id="custom-spec-row" class="hidden grid grid-cols-2 gap-3 mt-2">
          <div>
            <label class="block text-[10px] text-ink-4 mb-1">自訂 vCPU</label>
            <input id="f-vcpu-custom" type="number" min="1" max="128" placeholder="核數" oninput="updateResHint()"
              class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-[10px] text-ink-4 mb-1">自訂 RAM (GB)</label>
            <input id="f-ram-custom" type="number" min="1" max="512" placeholder="GB" oninput="updateResHint()"
              class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm">
          </div>
        </div>
        <!-- 規格預覽 -->
        <div id="flavor-preview" class="hidden mt-1.5 text-[11px] text-ink-4 bg-surf-2 rounded-[6px] px-3 py-1.5 font-mono">
          <span id="flavor-preview-text"></span>
        </div>
      </div>

      <!-- 映像檔 (OS Image) -->
      <div>
        <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">映像檔 <span class="text-red">*</span></label>
        <select id="f-image" class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm bg-white">
          <option value="">— 選擇映像檔 —</option>
        </select>
      </div>

      <!-- 磁碟大小 & 磁碟類型 -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">磁碟大小 (GB) <span class="text-red">*</span></label>
          <input id="f-disk" type="number" min="50" max="20000" placeholder="例：500" oninput="updateResHint()"
            class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">磁碟類型 <span class="text-red">*</span></label>
          <select id="f-disk-type" class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm bg-white">
            <option value="">— 選擇 —</option>
          </select>
        </div>
      </div>

      <!-- 系統角色 & Subnet -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">系統角色 <span class="text-red">*</span></label>
          <select id="f-role" class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm bg-white">
            <option value="">— 選擇 —</option>
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">Subnet <span class="text-red">*</span></label>
          <select id="f-subnet" class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm bg-white">
            <option value="">— 選擇子網路 —</option>
          </select>
        </div>
      </div>

      <!-- IP 位址 -->
      <div>
        <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">IP 位址 <span class="text-red">*</span></label>
        <input id="f-ip" type="text" placeholder="例：10.0.1.50"
          class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm font-mono">
      </div>

      <!-- 初始狀態 -->
      <div>
        <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">初始狀態</label>
        <div class="flex gap-4">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="f-status" value="running" checked class="accent-or">
            <span class="text-sm"><span class="dot dot-run"></span>Running</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="f-status" value="stopped" class="accent-or">
            <span class="text-sm"><span class="dot dot-stop"></span>Stopped</span>
          </label>
        </div>
      </div>

      <!-- 備註 -->
      <div>
        <label class="block text-[11px] font-semibold text-ink-3 uppercase tracking-wide mb-1.5">備註 <span class="text-ink-4 font-normal normal-case">(選填)</span></label>
        <textarea id="f-note" rows="2" placeholder="用途說明、特殊需求…"
          class="w-full border border-bord rounded-[6px] px-3 py-2 text-sm resize-none"></textarea>
      </div>

      <!-- 資源剩餘提示 -->
      <div id="res-hint-box" class="hidden rounded-[8px] border px-4 py-3 text-[12px]">
        <div class="font-semibold mb-2 text-ink-3">建立後剩餘資源</div>
        <div class="flex gap-5 flex-wrap">
          <div>CPU：<span id="rh-cpu" class="font-mono font-bold">—</span></div>
          <div>記憶體：<span id="rh-mem" class="font-mono font-bold">—</span></div>
          <div>磁碟：<span id="rh-disk" class="font-mono font-bold">—</span></div>
        </div>
        <div id="rh-msg" class="mt-1.5 text-[11px] hidden"></div>
      </div>

    </div>

    <!-- Modal Footer -->
    <div class="flex justify-end gap-2 px-6 py-4 border-t border-bord bg-surf-2">
      <button onclick="closeModal()" class="px-4 py-2 text-xs font-semibold border border-bord rounded-[6px] hover:bg-white transition-colors">取消</button>
      <button id="btn-create" onclick="createVM()"
        class="px-4 py-2 text-xs font-semibold bg-or text-white rounded-[6px] hover:bg-or-d transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
        建立 VM
      </button>
    </div>
  </div>
</div>

<!-- ══ 確認刪除 DIALOG ══ -->
<div id="confirmDlg" class="overlay hidden" onclick="closeConfirm()">
  <div class="modal-in bg-white rounded-xl shadow-2xl w-full max-w-[380px] mx-4 p-6" onclick="event.stopPropagation()">
    <div class="text-[15px] font-bold mb-2">確認刪除 VM？</div>
    <div class="text-sm text-ink-3 mb-5">即將刪除 <span id="confirm-vm-name" class="font-semibold text-red"></span>，此操作無法復原。</div>
    <div class="flex justify-end gap-2">
      <button onclick="closeConfirm()" class="px-4 py-2 text-xs font-semibold border border-bord rounded-[6px] hover:bg-surf-2 transition-colors">取消</button>
      <button onclick="confirmDeleteVM()" class="px-4 py-2 text-xs font-semibold bg-red text-white rounded-[6px] hover:opacity-90 transition-colors">確認刪除</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<script src="data-service.js"></script>

════════════════════════════ */
function setEnvFilter(v) {
  curEnvFilter = v;
  ['all','Prod','UAT'].forEach(k => {
    const btn = document.getElementById('ef-' + k.toLowerCase());
    if (btn) {
      btn.className = btn.className.replace(/bg-or text-white|bg-white text-ink-3/, '');
      btn.className += (k === v ? ' bg-or text-white' : ' bg-white text-ink-3');
    }
  });
  renderAll();
}

/* ════════════════════════════
   RENDER
════════════════════════════ */
function renderAll() {
  const container = document.getElementById('poolList');
  const filtered = Object.values(POOLS).filter(p =>
    curEnvFilter === 'all' || p.env === curEnvFilter
  );
  if (!filtered.length) {
    container.innerHTML = `<div class="text-center text-ink-4 py-16 text-sm">目前篩選條件下無可用 Pool</div>`;
    return;
  }
  container.innerHTML = filtered.map((p, i) =>
    `<div class="pool-card anim" style="animation-delay:${i*60}ms" id="card-${p.id}">${poolCardHtml(p)}</div>`
  ).join('');
}

function poolCardHtml(p) {
  const cpuPct = Math.round(p.cpu.u / p.cpu.t * 100);
  const memPct = Math.round(p.mem.u / p.mem.t * 100);
  const diskPct = Math.round(p.disk.u / p.disk.t * 100);

  return `
    <div class="pool-header">
      <div class="flex-1 flex items-center gap-2.5 min-w-0">
        <div class="w-8 h-8 rounded-[6px] flex items-center justify-center text-sm flex-shrink-0
          ${p.type === 'dedicated' ? 'bg-ded-l text-ded' : 'bg-shr-l text-shr'}">
          ${p.type === 'dedicated' ? '🖥' : '🔗'}
        </div>
        <div class="min-w-0">
          <div class="font-semibold text-[13px] truncate">${p.name}</div>
          <div class="text-[11px] text-ink-4 mt-0.5">${p.cloud} · ${p.site}</div>
        </div>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <span class="badge ${p.type === 'dedicated' ? 'b-ded' : 'b-shr'}">${p.type}</span>
        <span class="badge ${p.env === 'Prod' ? 'b-prod' : 'b-uat'}">${p.env}</span>
        <span class="text-[11px] text-ink-4 font-mono ml-2">${p.id}</span>
      </div>
    </div>
    <!-- 容量列 -->
    <div class="px-4 py-3 border-b border-bord grid grid-cols-3 gap-4 bg-surf-2">
      ${resBarHtml('CPU', p.cpu.u, p.cpu.t, '核')}
      ${resBarHtml('記憶體', p.mem.u, p.mem.t, 'GB')}
      ${resBarHtml('磁碟', Math.round(p.disk.u/1024*10)/10, Math.round(p.disk.t/1024*10)/10, 'TB')}
    </div>
    <!-- VM 列表 / Allocation列表 -->
    ${p.type === 'dedicated' ? dedicatedBodyHtml(p) : sharedBodyHtml(p)}
  `;
}

function resBarHtml(label, used, total, unit) {
  const pct = Math.round(used / total * 100);
  const cls = pct >= 85 ? 'fill-red' : pct >= 70 ? 'fill-amb' : 'fill-grn';
  return `
    <div>
      <div class="flex justify-between text-[10px] text-ink-4 mb-1">
        <span>${label}</span>
        <span class="font-mono">${used}/${total} ${unit} (${pct}%)</span>
      </div>
      <div class="res-bar"><div class="res-fill ${cls}" style="width:${pct}%"></div></div>
    </div>`;
}

function dedicatedBodyHtml(p) {
  const rows = p.vms.length ? p.vms.map(v => vmRowHtml(v, p.id, null)).join('') :
    `<tr><td colspan="6" class="text-center text-ink-4 py-6 text-xs">尚無 VM，點下方按鈕新增</td></tr>`;
  return `
    <div class="pool-body">
      <table class="vm-tbl" id="tbl-${p.id}">
        <thead><tr>
          <th>VM 名稱 / 角色</th><th>狀態</th><th>規格</th>
          <th>映像檔</th><th>磁碟</th><th>IP / Subnet</th><th>操作</th>
        </tr></thead>
        <tbody id="tbody-${p.id}">${rows}</tbody>
      </table>
      <div class="px-4 py-3 border-t border-bord">
        <button onclick="openModal('${p.id}', null)"
          class="flex items-center gap-1.5 text-xs font-semibold text-or hover:text-or-d transition-colors">
          <span class="text-base leading-none">+</span> 新增 VM
        </button>
      </div>
    </div>`;
}

function sharedBodyHtml(p) {
  const myAllocs = p.allocs; // 在 Demo 中直接顯示
  return myAllocs.map(a => {
    const cpuPct = Math.round(a.used_cpu / a.quota_cpu * 100);
    const memPct = Math.round(a.used_mem / a.quota_mem * 100);
    const diskPct = Math.round(a.used_disk / a.quota_disk * 100);
    const rows = a.vms.length ? a.vms.map(v => vmRowHtml(v, p.id, a.id)).join('') :
      `<tr><td colspan="6" class="text-center text-ink-4 py-6 text-xs">尚無 VM，點下方按鈕新增</td></tr>`;
    return `
      <div class="pool-body border-t border-bord">
        <!-- Alloc Header -->
        <div class="px-4 py-2.5 bg-shr-l flex items-center gap-3 flex-wrap">
          <div class="flex items-center gap-1.5">
            <span class="text-[10px] font-bold text-shr uppercase tracking-wide">配額</span>
            <span class="text-xs font-semibold text-ink-2">${a.sys} · ${a.proj} · ${a.env}</span>
          </div>
          <div class="flex items-center gap-3 text-[11px] text-ink-4 ml-auto flex-wrap">
            ${allocQuotaHtml('CPU', a.used_cpu, a.quota_cpu, '核', cpuPct)}
            ${allocQuotaHtml('Mem', a.used_mem, a.quota_mem, 'GB', memPct)}
            ${allocQuotaHtml('Disk', Math.round(a.used_disk/1024*10)/10, Math.round(a.quota_disk/1024*10)/10, 'TB', diskPct)}
          </div>
        </div>
        <!-- VM Table -->
        <table class="vm-tbl" id="tbl-${p.id}-${a.id}">
          <thead><tr>
            <th>VM 名稱</th><th>狀態</th><th>規格 (vCPU / RAM / Disk)</th>
            <th>環境</th><th>IP 位址</th><th>操作</th>
          </tr></thead>
          <tbody id="tbody-${p.id}-${a.id}">${rows}</tbody>
        </table>
        <div class="px-4 py-3 border-t border-bord">
          <button onclick="openModal('${p.id}', '${a.id}')"
            class="flex items-center gap-1.5 text-xs font-semibold text-shr hover:opacity-80 transition-colors">
            <span class="text-base leading-none">+</span> 在此配額下新增 VM
          </button>
        </div>
      </div>`;
  }).join('');
}

function allocQuotaHtml(label, used, total, unit, pct) {
  const cls = pct >= 85 ? 'text-red font-semibold' : pct >= 70 ? 'text-amb' : '';
  return `<span class="${cls}">${label}: ${used}/${total}${unit}(${pct}%)</span>`;
}

function vmRowHtml(v, poolId, allocId) {
  const diskDisp = v.disk >= 1024 ? (v.disk/1024).toFixed(1)+' TB' : v.disk+' GB';
  const aid = allocId ? `'${allocId}'` : 'null';
  const flavorLabel = v.flavor || 'custom';
  const specText = `${v.vcpu}C / ${v.ram}GB`;
  const imageLabel = v.image || '—';
  const diskTypeLabel = v.diskType ? v.diskType.toUpperCase() : '—';
  const roleLabel = v.role || '—';
  const snDef = v.subnet ? SUBNETS.find(s => s.id === v.subnet) : null;
  const subnetShort = snDef ? snDef.label.split('—')[0].trim() : (v.subnet ? v.subnet.replace(/^sn-\w+-/,'').replace(/-/g,' ') : '—');

  return `<tr id="row-${v.id}" class="vm-row">
    <td>
      <div class="flex items-center gap-1.5">
        <span class="dot ${v.status==='running'?'dot-run':'dot-stop'}"></span>
        <div>
          <div class="font-mono text-[12px] font-semibold">${v.name}</div>
          <div class="text-[10px] text-ink-4">${v.hostname||v.name} · <span class="text-ink-3">${roleLabel}</span></div>
        </div>
      </div>
    </td>
    <td>
      <span class="badge ${v.status==='running'?'b-run':'b-stop'}" id="status-badge-${v.id}">
        ${v.status==='running'?'Running':'Stopped'}
      </span>
    </td>
    <td>
      <div class="font-mono text-[11px] font-semibold text-ink-2">${specText}</div>
      <div class="text-[10px] text-ink-4">${flavorLabel}</div>
    </td>
    <td class="text-[11px] text-ink-3">${imageLabel}</td>
    <td>
      <div class="text-[11px] font-mono">${diskDisp}</div>
      <div class="text-[10px] text-ink-4">${diskTypeLabel}</div>
    </td>
    <td>
      <div class="font-mono text-[11px] text-ink-3">${v.ip}</div>
      <div class="text-[10px] text-ink-4 capitalize">${subnetShort}</div>
    </td>
    <td>
      <div class="flex items-center gap-1">
        <button onclick="toggleVMStatus('${poolId}', ${aid}, '${v.id}')"
          title="${v.status==='running'?'停止':'啟動'}"
          class="text-[11px] px-2 py-1 rounded-[4px] border border-bord hover:bg-surf-2 transition-colors text-ink-3"
          id="btn-toggle-${v.id}">
          ${v.status==='running'?'⏹ 停止':'▶ 啟動'}
        </button>
        <button onclick="askDeleteVM('${poolId}', ${aid}, '${v.id}', '${v.name}')"
          title="刪除" class="text-[11px] px-2 py-1 rounded-[4px] border border-bord hover:bg-red-l hover:border-red-m hover:text-red transition-colors text-ink-3">
          🗑
        </button>
      </div>
    </td>
  </tr>`;
}

/* ════════════════════════════
   MODAL
════════════════════════════ */
function openModal(poolId, allocId) {
  modalPoolId = poolId;
  modalAllocId = allocId;
  const pool = POOLS[poolId];
  const ck = CLOUD_KEY[pool.cloud] || 'private';

  // Reset text/number inputs
  ['f-name','f-hostname','f-disk','f-ip','f-vcpu-custom','f-ram-custom','f-note'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  ['f-flavor','f-image','f-disk-type','f-role','f-subnet'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.querySelector('input[name="f-status"][value="running"]').checked = true;
  document.getElementById('res-hint-box').classList.add('hidden');
  document.getElementById('flavor-preview').classList.add('hidden');
  document.getElementById('custom-spec-row').classList.add('hidden');
  document.getElementById('btn-create').disabled = false;

  // Pool header
  const envBadge = `<span class="badge ${pool.env==='Prod'?'b-prod':'b-uat'} ml-1">${pool.env}</span>`;
  document.getElementById('modal-pool-name').innerHTML =
    `${pool.name} <span class="text-ink-4">(${pool.id})</span> · ${pool.type==='dedicated'?'Dedicated':'Shared'} ${envBadge}`;

  // Populate 規格套餐 (cloud-specific)
  const flavors = FLAVORS[ck] || FLAVORS.private;
  document.getElementById('f-flavor').innerHTML =
    `<option value="">— 選擇規格 —</option>` +
    flavors.map(f => `<option value="${f.id}">${f.desc}</option>`).join('');

  // Populate 映像檔
  const images = IMAGES[ck] || IMAGES.private;
  document.getElementById('f-image').innerHTML =
    `<option value="">— 選擇映像檔 —</option>` +
    images.map(i => `<option value="${i.id}">${i.label}</option>`).join('');

  // Populate 磁碟類型
  const dtypes = DISK_TYPES[ck] || DISK_TYPES.private;
  document.getElementById('f-disk-type').innerHTML =
    `<option value="">— 選擇 —</option>` +
    dtypes.map(d => `<option value="${d.id}">${d.label}</option>`).join('');

  // Populate 系統角色
  document.getElementById('f-role').innerHTML =
    `<option value="">— 選擇 —</option>` +
    VM_ROLES.map(r => `<option value="${r}">${r}</option>`).join('');

  // Populate Subnet（依此 Pool 綁定的 Subnet 清單）
  const poolSubnetIds = pool.subnets || [];
  const subnets = SUBNETS.filter(s => poolSubnetIds.includes(s.id));
  document.getElementById('f-subnet').innerHTML =
    `<option value="">— 選擇子網路 —</option>` +
    subnets.map(s => `<option value="${s.id}">${s.label}</option>`).join('');


  // Shared：配額選擇
  const allocRow = document.getElementById('alloc-row');
  if (pool.type === 'shared') {
    allocRow.classList.remove('hidden');
    const sel = document.getElementById('f-alloc');
    sel.innerHTML = `<option value="">— 選擇系統配額 —</option>` +
      pool.allocs.map(a =>
        `<option value="${a.id}"${allocId && a.id===allocId?' selected':''}>` +
        `${a.sys} · ${a.proj} （CPU 剩 ${a.quota_cpu-a.used_cpu}核 · Mem 剩 ${a.quota_mem-a.used_mem}GB）</option>`
      ).join('');
    document.getElementById('alloc-quota-hint').classList.add('hidden');
    if (allocId) { sel.value = allocId; onAllocChange(); }
  } else {
    allocRow.classList.add('hidden');
    document.getElementById('alloc-quota-hint').classList.add('hidden');
  }

  document.getElementById('vmModal').classList.remove('hidden');
}

function onFlavorChange() {
  const pool = POOLS[modalPoolId];
  const ck = CLOUD_KEY[pool.cloud] || 'private';
  const flavors = FLAVORS[ck] || FLAVORS.private;
  const fid = document.getElementById('f-flavor').value;
  const flavor = flavors.find(f => f.id === fid);

  const customRow = document.getElementById('custom-spec-row');
  const preview   = document.getElementById('flavor-preview');

  if (!flavor) { customRow.classList.add('hidden'); preview.classList.add('hidden'); return; }

  if (fid === 'custom') {
    customRow.classList.remove('hidden');
    preview.classList.add('hidden');
  } else {
    customRow.classList.add('hidden');
    preview.classList.remove('hidden');
    document.getElementById('flavor-preview-text').textContent =
      `${flavor.vcpu} vCPU  ·  ${flavor.ram} GB RAM`;
  }
  updateResHint();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('vmModal')) return;
  document.getElementById('vmModal').classList.add('hidden');
}

function onAllocChange() {
  const poolId = modalPoolId;
  const allocId = document.getElementById('f-alloc').value;
  const hint = document.getElementById('alloc-quota-hint');
  if (!allocId) { hint.classList.add('hidden'); return; }
  const alloc = POOLS[poolId].allocs.find(a => a.id === allocId);
  if (!alloc) return;
  document.getElementById('aq-cpu').textContent = (alloc.quota_cpu - alloc.used_cpu) + ' 核';
  document.getElementById('aq-mem').textContent = (alloc.quota_mem - alloc.used_mem) + ' GB';
  const diskFree = Math.round((alloc.quota_disk - alloc.used_disk) / 1024 * 10) / 10;
  document.getElementById('aq-disk').textContent = diskFree + ' TB';
  hint.classList.remove('hidden');
  updateResHint();
}

function getFlavorSpec() {
  const pool = POOLS[modalPoolId];
  const ck = CLOUD_KEY[pool.cloud] || 'private';
  const fid = document.getElementById('f-flavor').value;
  if (!fid) return { vcpu:0, ram:0 };
  if (fid === 'custom') {
    return {
      vcpu: parseInt(document.getElementById('f-vcpu-custom').value) || 0,
      ram:  parseInt(document.getElementById('f-ram-custom').value)  || 0,
    };
  }
  const flavor = (FLAVORS[ck]||FLAVORS.private).find(f => f.id === fid);
  return flavor ? { vcpu: flavor.vcpu, ram: flavor.ram } : { vcpu:0, ram:0 };
}

function updateResHint() {
  const pool = POOLS[modalPoolId];
  if (!pool) return;

  const { vcpu, ram } = getFlavorSpec();
  const disk = parseInt(document.getElementById('f-disk').value) || 0;
  if (!vcpu && !ram && !disk) {
    document.getElementById('res-hint-box').classList.add('hidden');
    return;
  }

  let freeCpu, freeMem, freeDisk;
  if (pool.type === 'dedicated') {
    freeCpu  = pool.cpu.t  - pool.cpu.u;
    freeMem  = pool.mem.t  - pool.mem.u;
    freeDisk = pool.disk.t - pool.disk.u;
  } else {
    const allocId = document.getElementById('f-alloc').value;
    const alloc = pool.allocs.find(a => a.id === allocId);
    if (!alloc) return;
    freeCpu  = alloc.quota_cpu  - alloc.used_cpu;
    freeMem  = alloc.quota_mem  - alloc.used_mem;
    freeDisk = alloc.quota_disk - alloc.used_disk;
  }

  const afterCpu  = freeCpu  - vcpu;
  const afterMem  = freeMem  - ram;
  const afterDisk = freeDisk - disk;

  const box = document.getElementById('res-hint-box');
  box.classList.remove('hidden');

  const isOver = afterCpu < 0 || afterMem < 0 || afterDisk < 0;

  box.className = box.className.replace(/border-\S+|bg-\S+/g, '');
  if (isOver) {
    box.classList.add('border-red', 'bg-red-l');
  } else if (afterCpu / freeCpu < 0.1 || afterMem / freeMem < 0.1) {
    box.classList.add('border-amb', 'bg-amb-l');
  } else {
    box.classList.add('border-grn', 'bg-grn-l');
  }

  const fmt = (v, u) => `<span class="${v < 0 ? 'text-red' : ''}">${v < 0 ? '不足' : v + u}</span>`;
  document.getElementById('rh-cpu').innerHTML  = fmt(afterCpu, ' 核');
  document.getElementById('rh-mem').innerHTML  = fmt(afterMem, ' GB');
  document.getElementById('rh-disk').innerHTML = fmt(Math.round(afterDisk/1024*10)/10, ' TB');

  const msg = document.getElementById('rh-msg');
  if (isOver) {
    msg.classList.remove('hidden');
    msg.className = 'mt-1.5 text-[11px] text-red font-semibold';
    msg.textContent = '⚠ 資源不足，無法建立此 VM';
  } else {
    msg.classList.add('hidden');
  }
  document.getElementById('btn-create').disabled = isOver;
}

/* ════════════════════════════
   CREATE VM
════════════════════════════ */
function createVM() {
  const pool = POOLS[modalPoolId];
  const name     = document.getElementById('f-name').value.trim();
  const hostname = document.getElementById('f-hostname').value.trim() || name;
  const flavorId = document.getElementById('f-flavor').value;
  const image    = document.getElementById('f-image').value;
  const disk     = parseInt(document.getElementById('f-disk').value);
  const diskType = document.getElementById('f-disk-type').value;
  const role     = document.getElementById('f-role').value;
  const subnet   = document.getElementById('f-subnet').value;
  const ip       = document.getElementById('f-ip').value.trim();
  const note     = document.getElementById('f-note').value.trim();
  const status   = document.querySelector('input[name="f-status"]:checked').value;
  const env      = pool.env;
  const { vcpu, ram } = getFlavorSpec();

  // Validate required fields
  if (!name || !flavorId || !image || !disk || !diskType || !role || !subnet || !ip) {
    toast('請填寫所有必填欄位', true); return;
  }
  if (!vcpu || !ram) { toast('請完整填寫自訂規格', true); return; }
  if (pool.type === 'shared' && !document.getElementById('f-alloc').value) {
    toast('請選擇系統配額', true); return;
  }
  if (!/^\d{1,3}(\.\d{1,3}){3}$/.test(ip)) {
    toast('IP 位址格式不正確', true); return;
  }

  const vmId = 'vm-' + Date.now();
  const newVM = { id:vmId, name, hostname, status, flavor:flavorId, vcpu, ram,
                  disk, diskType, image, role, subnet, env, ip, note,
                  /* DataService 格式欄位（供 localStorage 存取）*/
                  ram_gb: ram, disk_gb: disk, subnet_id: subnet,
                  pool_id: modalPoolId, alloc_id: modalAllocId || null,
                  tags: { env, role } };

  DataService.createVM(newVM); // 非同步寫入，不需等待回傳

  if (pool.type === 'dedicated') {
    pool.vms.push(newVM);
    pool.cpu.u  += vcpu;
    pool.mem.u  += ram;
    pool.disk.u += disk;
    refreshPoolCard(modalPoolId);
    insertVMRow(modalPoolId, null, newVM);
  } else {
    const allocId = document.getElementById('f-alloc').value;
    const alloc = pool.allocs.find(a => a.id === allocId);
    alloc.vms.push(newVM);
    alloc.used_cpu  += vcpu;
    alloc.used_mem  += ram;
    alloc.used_disk += disk;
    pool.cpu.u  += vcpu;
    pool.mem.u  += ram;
    pool.disk.u += disk;
    refreshPoolCard(modalPoolId);
    insertVMRow(modalPoolId, allocId, newVM);
  }

  document.getElementById('vmModal').classList.add('hidden');
  toast(`✓ VM "${name}" 已建立`);
}

function refreshPoolCard(poolId) {
  const card = document.getElementById('card-' + poolId);
  if (card) card.innerHTML = poolCardHtml(POOLS[poolId]);
}

function insertVMRow(poolId, allocId, vm) {
  const tbodyId = allocId ? `tbody-${poolId}-${allocId}` : `tbody-${poolId}`;
  const tbody = document.getElementById(tbodyId);
  if (!tbody) { refreshPoolCard(poolId); return; }
  // Remove empty placeholder if present
  const placeholder = tbody.querySelector('td[colspan]');
  if (placeholder) placeholder.closest('tr').remove();
  const tr = document.createElement('tr');
  tr.id = 'row-' + vm.id;
  tr.className = 'vm-row vm-row-new';
  tr.innerHTML = vmRowHtml(vm, poolId, allocId).replace(/^<tr[^>]*>/, '').replace(/<\/tr>$/, '');
  tbody.appendChild(tr);
}

/* ════════════════════════════
   TOGGLE STATUS
════════════════════════════ */
function toggleVMStatus(poolId, allocId, vmId) {
  const pool = POOLS[poolId];
  let vm;
  if (!allocId) {
    vm = pool.vms.find(v => v.id === vmId);
  } else {
    const alloc = pool.allocs.find(a => a.id === allocId);
    vm = alloc.vms.find(v => v.id === vmId);
  }
  if (!vm) return;
  vm.status = vm.status === 'running' ? 'stopped' : 'running';
  DataService.updateVM(vmId, { status: vm.status });

  const badge = document.getElementById('status-badge-' + vmId);
  if (badge) {
    badge.className = `badge ${vm.status==='running'?'b-run':'b-stop'}`;
    badge.textContent = vm.status === 'running' ? 'Running' : 'Stopped';
  }
  const toggleBtn = document.getElementById('btn-toggle-' + vmId);
  if (toggleBtn) toggleBtn.textContent = vm.status==='running' ? '⏹ 停止' : '▶ 啟動';

  // Update dot
  const row = document.getElementById('row-' + vmId);
  if (row) {
    const dot = row.querySelector('.dot');
    if (dot) { dot.className = `dot ${vm.status==='running'?'dot-run':'dot-stop'}`; }
  }

  toast(`${vm.status==='running'?'▶ 已啟動':'⏹ 已停止'}: ${vm.name}`);
}

/* ════════════════════════════
   DELETE VM
════════════════════════════ */
function askDeleteVM(poolId, allocId, vmId, vmName) {
  deleteTarget = { poolId, allocId, vmId };
  document.getElementById('confirm-vm-name').textContent = vmName;
  document.getElementById('confirmDlg').classList.remove('hidden');
}

function closeConfirm() {
  document.getElementById('confirmDlg').classList.add('hidden');
  deleteTarget = null;
}

function confirmDeleteVM() {
  if (!deleteTarget) return;
  const { poolId, allocId, vmId } = deleteTarget;
  const pool = POOLS[poolId];

  let vm, arr;
  if (!allocId) {
    arr = pool.vms;
    vm = arr.find(v => v.id === vmId);
    pool.vms = arr.filter(v => v.id !== vmId);
    pool.cpu.u  -= vm.vcpu;
    pool.mem.u  -= vm.ram;
    pool.disk.u -= vm.disk;
  } else {
    const alloc = pool.allocs.find(a => a.id === allocId);
    vm = alloc.vms.find(v => v.id === vmId);
    alloc.vms = alloc.vms.filter(v => v.id !== vmId);
    alloc.used_cpu  -= vm.vcpu;
    alloc.used_mem  -= vm.ram;
    alloc.used_disk -= vm.disk;
    pool.cpu.u  -= vm.vcpu;
    pool.mem.u  -= vm.ram;
    pool.disk.u -= vm.disk;
  }

  DataService.deleteVM(vmId);

  closeConfirm();
  refreshPoolCard(poolId);
  toast(`🗑 VM "${vm.name}" 已刪除`);
}

/* ════════════════════════════
   TOAST
════════════════════════════ */
function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#dc2626' : '#0f0f0f';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

/* ════════════════════════════
   INIT — 從 JSON 載入資料後渲染
════════════════════════════ */
(async () => {
  const container = document.getElementById('poolList');
  container.innerHTML = `<div class="text-center text-ink-4 py-16 text-sm">載入資料中…</div>`;
  try {
    const data = await DataService.loadAll();
    POOLS   = data.POOLS;
    SUBNETS = data.SUBNETS;
    renderAll();
  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="text-center text-red py-16 text-sm">資料載入失敗：${err.message}</div>`;
  }
})();
</script>
