<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專案維度 — 雲地整合平台</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind-config.js"></script>
  <script src="menu.js"></script>
  <script src="sidebar.js"></script>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* search input */
    .search-input:focus { border-color:#ea580c; box-shadow:0 0 0 2px rgba(234,88,12,.12); outline:none }
    .search-input::placeholder { color:#a3a3a3 }

    /* filter chips */
    .fchip.active-chip { background:#0f0f0f; border-color:#0f0f0f; color:#fff }
    .fchip.active { background:#0f0f0f; border-color:#0f0f0f; color:#fff }

    /* proj-tabs */
    .proj-tabs::-webkit-scrollbar { height: 3px }
    .proj-tab.active { color:#0f0f0f; border-bottom-color:#ea580c }
    .proj-tab.active .proj-tab-count { background:#fff7ed; border-color:#fed7aa; color:#c2410c }
    .proj-tab.filtered-out { display:none }

    /* sub-view toggle */
    .stab.active { background:#fff; color:#0f0f0f; box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04) }

    /* vm/quota helpers */
    .vm-name  { font-weight:600; font-family:'Fira Code',monospace; font-size:11px }
    .vm-ip    { font-family:'Fira Code',monospace; font-size:11px; color:#a3a3a3 }
    .vm-spec  { font-family:'Fira Code',monospace; font-size:11px; color:#737373; white-space:nowrap }
    .status-dot { width:6px; height:6px; border-radius:50%; display:inline-block; margin-right:5px }
    .dot-run  { background:#22c55e; box-shadow:0 0 4px rgba(34,197,94,.5) }
    .dot-stop { background:#a3a3a3 }
    .alloc-proj { font-weight:700 }
    .alloc-sys  { color:#737373 }
    .quota-bar   { display:flex; align-items:center; gap:8px }
    .quota-track { width:80px; height:4px; background:#e8e8e8; border-radius:99px; overflow:hidden }
    .quota-fill  { height:100%; border-radius:99px; background:#0d9488 }
    .quota-val   { font-family:'Fira Code',monospace; font-size:10px; color:#737373 }

    /* proj-vm-table */
    .proj-vm-table { width:100%; border-collapse:collapse; margin-top:14px }
    .proj-vm-table th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#a3a3a3; padding:9px 14px; background:#fff; border-bottom:2px solid #e8e8e8; text-align:left; white-space:nowrap }
    .proj-vm-table td { font-size:13px; padding:10px 14px; border-bottom:1px solid #e8e8e8; vertical-align:middle }
    .proj-vm-table tr:last-child td { border-bottom:none }
    .proj-vm-table tr:hover td { background:color-mix(in srgb,#ea580c 4%,white) }

    /* chip */
    .chip { display:inline-flex; align-items:center; font-family:'Fira Code',monospace; font-size:10px; padding:2px 8px; border-radius:3px; border:1px solid #e8e8e8; background:#f7f8fa; color:#737373 }

    /* badge base (shared.css has color variants) */
    .badge { display:inline-flex; align-items:center; font-size:9px; font-weight:700; padding:2px 6px; border-radius:3px; text-transform:uppercase; letter-spacing:.07em; white-space:nowrap }

    /* pool-id badges */
    .pid-ded { background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe }
    .pid-shr { background:#f0fdfa; color:#0d9488; border:1px solid #99f6e4 }
    .mpid-ded { background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe }
    .mpid-shr { background:#f0fdfa; color:#0d9488; border:1px solid #99f6e4 }

    /* hidden utility */
    .hidden { display:none !important }

    /* ── pcloud-block ── */
    .pcloud-block { margin-bottom:14px; border:1px solid #e8e8e8; border-radius:8px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04) }
    .pcloud-hd { display:flex; align-items:center; gap:10px; padding:11px 16px; border-bottom:1px solid #e8e8e8; background:#f7f8fa }
    .pcloud-dot { width:10px; height:10px; border-radius:2px }
    .pcloud-name { font-size:15px; font-weight:700; letter-spacing:-.01em }
    .pcloud-region { font-size:12px; color:#a3a3a3; font-family:'Fira Code',monospace; margin-left:auto }

    /* ── psite-block ── */
    .psite-block { border-bottom:1px solid #e8e8e8 }
    .psite-block:last-child { border-bottom:none }
    .psite-hd { display:flex; align-items:center; gap:8px; padding:10px 16px }
    .psite-name { font-size:13px; font-weight:600 }
    .psite-count { font-size:12px; color:#a3a3a3; font-family:'Fira Code',monospace; margin-left:auto }
    .psite-pools { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; padding:12px 16px 0 40px }

    /* ── mini-pool ── */
    .mini-pool { border:1px solid #e8e8e8; border-radius:7px; overflow:hidden; cursor:pointer; transition:all .15s; position:relative; min-height:92px }
    .mini-pool.mp-ded { background:#eff6ff }
    .mini-pool.mp-shr { background:#f0fdfa }
    .mini-pool:hover { border-color:#d4d4d4; box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04) }
    .mini-pool::before { content:''; position:absolute; top:0; left:0; right:0; height:2px }
    .mini-pool.mp-ded::before { background:#2563eb }
    .mini-pool.mp-shr::before { background:#0d9488 }
    .mini-pool.mp-open { border-color:#ea580c; box-shadow:0 0 0 1px #ea580c }
    .mini-pool.mp-open::before { background:#ea580c }
    .mini-pool.mp-open .mp-chev { transform:rotate(180deg); color:#ea580c }
    .mini-pool-top { display:flex; align-items:center; gap:8px; padding:12px 14px 2px 14px }
    .mpid { font-family:'Fira Code',monospace; font-size:11px; font-weight:600; padding:3px 7px; border-radius:3px }
    .mpname { font-size:12px; font-weight:600; color:#0f0f0f; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .mp-chev { font-size:12px; color:#a3a3a3; transition:transform .2s; flex-shrink:0 }
    .mini-pool-tags { display:flex; gap:4px; flex-wrap:wrap; padding:8px 14px 14px }
    .mpt { font-size:10px; font-weight:700; padding:2px 7px; border-radius:3px; text-transform:uppercase; letter-spacing:.05em; white-space:nowrap }
    .mpt-prod { background:#f0fdf4; color:#16a34a; border:1px solid #bbf7d0 }
    .mpt-uat  { background:#f5f3ff; color:#7c3aed; border:1px solid #ddd6fe }
    .mpt-dr   { background:#fef2f2; color:#dc2626; border:1px solid #fecaca }
    .mpt-sys  { background:#f7f8fa; color:#737373; border:1px solid #e8e8e8 }
    .mpt-ded  { background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe }
    .mpt-shr  { background:#f0fdfa; color:#0d9488; border:1px solid #99f6e4 }

    /* ── proj-vm-fullrow ── */
    .proj-vm-fullrow { display:none; border-top:1px solid #e8e8e8; border-left:3px solid #ea580c; background:#f7f8fa; margin:0 0 14px 0; animation:fadeUp .2s ease both }
    .proj-vm-fullrow.visible { display:block }
    .proj-vm-fullrow-hd { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; border-bottom:1px solid #e8e8e8; background:#fff7ed }
    .proj-vm-fullrow-title { font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#c2410c; display:flex; align-items:center; gap:8px }
    .proj-vm-fullrow-close { font-size:11px; font-weight:600; color:#737373; cursor:pointer; padding:3px 8px; border-radius:4px; border:1px solid #e8e8e8; background:#fff; transition:all .15s; font-family:inherit }
    .proj-vm-fullrow-close:hover { border-color:#ea580c; color:#ea580c }
    .proj-vm-table-wrap { overflow-x:auto; padding:0 20px 16px }

    /* ── sys view ── */
    .sys-sel-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-bottom:20px }
    .sys-card { background:#fff; border:1px solid #e8e8e8; border-radius:8px; padding:14px; cursor:pointer; text-align:center; transition:all .18s; box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04) }
    .sys-card:hover { border-color:#ea580c; transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04) }
    .sys-card.active { border-color:#ea580c; background:#fff7ed }
    .sys-card-icon { font-size:22px; margin-bottom:6px }
    .sys-card-name { font-size:14px; font-weight:700; color:#0f0f0f }
    .sys-card-sub  { font-size:11px; color:#a3a3a3; font-family:'Fira Code',monospace; margin-top:2px }
    .sys-cloud-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:12px }
    .sys-cloud-card { background:#fff; border:1px solid #e8e8e8; border-radius:8px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04) }
    .sys-cloud-hd   { padding:10px 12px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #e8e8e8; background:#f7f8fa }
    .sys-cloud-dot  { width:8px; height:8px; border-radius:2px }
    .sys-cloud-name { font-size:14px; font-weight:700 }
    .sys-cloud-body { padding:10px 14px; display:flex; flex-direction:column; gap:6px }
    .sys-pool-row   { display:flex; align-items:center; gap:8px; padding:9px 12px; background:#f7f8fa; border:1px solid #e8e8e8; border-radius:5px; font-size:13px }
    .sys-pool-id    { font-family:'Fira Code',monospace; font-size:11px; font-weight:600; padding:3px 7px; border-radius:3px; flex-shrink:0 }
    .sys-pool-site  { color:#737373; flex:1; font-size:12px }

    /* anim */
    .anim { animation:fadeUp .25s ease both }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    @media(max-width:600px) {
      .proj-search-bar { flex-direction:column; align-items:stretch }
      .search-input-wrap { max-width:none }
      .sys-cloud-grid { grid-template-columns:1fr }
      .psite-pools { grid-template-columns:1fr; padding-left:14px }
    }
  </style>
</head>

<script>
  /* ════════════════════════════
     DATA GLOBALS
  ════════════════════════════ */
  const CLOUD_META = { private: { label:'私有雲', color:'#2563eb' }, hicloud: { label:'hiCloud', color:'#0e7490' }, aws: { label:'AWS', color:'#b45309' } };
  let POOLS = {};
  let PROJ_DATA = {};

  /* ════════════════════════════
     PROJECT DIMENSION STATE
  ════════════════════════════ */
  let curProj = 'power', curSys = null, curSubView = 'cloud', activeFilter = 'all';

  function filterProjTabs(q) {
    const s = q.toLowerCase();
    document.querySelectorAll('.proj-tab').forEach(t => {
      const name = t.dataset.name || '';
      t.classList.toggle('filtered-out', !!s && !name.toLowerCase().includes(s));
    });
  }

  function toggleFilter(el, val) {
    activeFilter = val;
    document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderProjView();
  }

  function selectProjTab(key, el) {
    curProj = key; curSys = null;
    document.querySelectorAll('.proj-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderProjView();
  }

  function switchSubView(v) {
    curSubView = v;
    document.getElementById('sv-cloud').classList.toggle('hidden', v !== 'cloud');
    document.getElementById('sv-sys').classList.toggle('hidden', v !== 'sys');
    document.getElementById('stab-cloud').classList.toggle('active', v === 'cloud');
    document.getElementById('stab-sys').classList.toggle('active', v === 'sys');
    renderProjView();
  }

  function renderProjView() {
    if (!PROJ_DATA[curProj]) return;
    if (curSubView === 'cloud') renderProjCloud();
    else renderProjSys();
  }

  function projVmTableHtml(p) {
    const isDed = p.type === 'dedicated';
    if (isDed && p.vms) {
      return '<table class="proj-vm-table"><thead><tr><th>VM 名稱</th><th>狀態</th><th>規格 (vCPU / RAM / Disk)</th><th>環境</th><th>IP 位址</th></tr></thead><tbody>' +
        p.vms.map(v => '<tr>' +
          '<td><span class="status-dot ' + (v.status === 'running' ? 'dot-run' : 'dot-stop') + '"></span><span class="vm-name">' + v.name + '</span></td>' +
          '<td><span class="badge ' + (v.status === 'running' ? 'b-run' : 'b-stop') + '" style="font-size:10px">' + (v.status === 'running' ? 'Running' : 'Stopped') + '</span></td>' +
          '<td class="vm-spec">' + v.vcpu + ' vCPU &nbsp;·&nbsp; ' + v.ram + ' &nbsp;·&nbsp; ' + v.disk + '</td>' +
          '<td><span class="badge ' + (v.env === 'Prod' ? 'b-prod' : 'b-uat') + '" style="font-size:10px">' + v.env + '</span></td>' +
          '<td class="vm-ip">' + v.ip + '</td>' +
          '</tr>').join('') +
        '</tbody></table>';
    }
    if (!isDed && p.allocs) {
      return '<table class="proj-vm-table"><thead><tr><th>專案</th><th>系統</th><th>環境</th><th>CPU 配額</th><th>Memory 配額</th></tr></thead><tbody>' +
        p.allocs.map(a => '<tr>' +
          '<td style="font-weight:700">' + a.proj + '</td>' +
          '<td>' + a.sys + '</td>' +
          '<td><span class="badge ' + (a.env === 'Prod' ? 'b-prod' : 'b-uat') + '" style="font-size:10px">' + a.env + '</span></td>' +
          '<td><div class="quota-bar"><div class="quota-track"><div class="quota-fill" style="width:55%"></div></div><span class="quota-val">' + a.quota_cpu + '</span></div></td>' +
          '<td><div class="quota-bar"><div class="quota-track"><div class="quota-fill" style="width:55%"></div></div><span class="quota-val">' + a.quota_mem + '</span></div></td>' +
          '</tr>').join('') +
        '</tbody></table>';
    }
    return '';
  }

  const openMiniPool = {};

  function toggleMiniPool(el, poolId, siteKey) {
    const pool = POOLS[poolId];
    if (!pool) return;
    const isDed = pool.type === 'dedicated';
    const count = isDed ? (pool.vms?.length || 0) : (pool.allocs?.length || 0);
    const psiteBlock = el.closest('.psite-block');
    if (!psiteBlock) return;

    if (el.classList.contains('mp-open')) {
      el.classList.remove('mp-open');
      const existing = psiteBlock.querySelector('.proj-vm-fullrow');
      if (existing) existing.remove();
      openMiniPool[siteKey] = null;
      return;
    }

    psiteBlock.querySelectorAll('.mini-pool.mp-open').forEach(mp => mp.classList.remove('mp-open'));
    const existing = psiteBlock.querySelector('.proj-vm-fullrow');
    if (existing) existing.remove();

    el.classList.add('mp-open');
    openMiniPool[siteKey] = poolId;

    const panel = document.createElement('div');
    panel.className = 'proj-vm-fullrow visible';
    const closeId = 'close-' + poolId + '-' + siteKey.replace(/[^a-z0-9]/gi, '');
    panel.innerHTML =
      '<div class="proj-vm-fullrow-hd">' +
      '<div class="proj-vm-fullrow-title">' +
      (isDed ? '🖥 VM 清單' : '🔗 申請狀況') +
      ' <span class="chip">' + count + ' 筆 &nbsp;·&nbsp; ' + poolId + ' ' + pool.name + '</span>' +
      '</div>' +
      '<button id="' + closeId + '" class="proj-vm-fullrow-close">✕ 收起</button>' +
      '</div>' +
      '<div class="proj-vm-table-wrap">' + projVmTableHtml(pool) + '</div>';

    const psitePools = psiteBlock.querySelector('.psite-pools');
    psitePools.after(panel);
    document.getElementById(closeId).addEventListener('click', function () {
      toggleMiniPool(el, poolId, siteKey);
    });
    setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }

  function renderProjCloud() {
    const pd = PROJ_DATA[curProj];
    let html = '';
    Object.entries(pd.cloudView).forEach(([ck, cd]) => {
      html += '<div class="pcloud-block">';
      html += '<div class="pcloud-hd"><div class="pcloud-dot" style="background:' + cd.color + '"></div><div class="pcloud-name">' + cd.label + '</div><div class="pcloud-region">' + cd.sites.flatMap(s => s.pools).length + ' pools</div></div>';
      cd.sites.forEach((s, si) => {
        const siteKey = ck + '-' + si;
        html += '<div class="psite-block">';
        html += '<div class="psite-hd"><span class="badge ' + (s.type === 'main' ? 'b-main' : 'b-dr') + '">' + (s.type === 'main' ? '主中心' : '異備 DR') + '</span><span class="psite-name" style="margin-left:8px">' + s.name + '</span><span class="psite-count">' + s.pools.length + ' pools</span></div>';
        html += '<div class="psite-pools">';
        s.pools.forEach(pool => {
          const isDed = pool.type === 'dedicated';
          const p = POOLS[pool.id];
          const count = isDed ? (p?.vms?.length || 0) : (p?.allocs?.length || 0);
          html += '<div class="mini-pool ' + (isDed ? 'mp-ded' : 'mp-shr') + '" data-pool="' + pool.id + '" onclick="toggleMiniPool(this,\'' + pool.id + '\',\'' + siteKey + '\')">' +
            '<div class="mini-pool-top"><span class="mpid ' + (isDed ? 'mpid-ded' : 'mpid-shr') + '">' + pool.id + '</span><span class="mpname">' + pool.name + '</span><span class="badge b-neutral" style="font-size:10px;margin-left:auto;margin-right:4px">' + count + (isDed ? ' VMs' : ' Allocs') + '</span><span class="mp-chev">▾</span></div>' +
            '<div class="mini-pool-tags"><span class="mpt ' + (isDed ? 'mpt-ded' : 'mpt-shr') + '">' + pool.type + '</span><span class="mpt ' + (pool.env === 'Prod' ? 'mpt-prod' : 'mpt-uat') + '">' + pool.env + '</span><span class="mpt mpt-sys">' + pool.sys + '</span></div>' +
            '</div>';
        });
        html += '</div></div>';
      });
      html += '</div>';
    });
    document.getElementById('sv-cloud').innerHTML = html;
  }

  function renderProjSys() {
    const pd = PROJ_DATA[curProj];
    const sysList = Object.entries(pd.sysView);
    if (!curSys) curSys = sysList[0][0];
    const selPools = pd.sysView[curSys].pools;
    const byCloud = {};
    selPools.forEach(p => {
      const ck = Object.keys(CLOUD_META).find(k => CLOUD_META[k].label === p.cloud);
      if (!byCloud[p.cloud]) byCloud[p.cloud] = { label: p.cloud, color: CLOUD_META[ck]?.color || '#0f0f0f', rows: [] };
      byCloud[p.cloud].rows.push(p);
    });
    document.getElementById('sv-sys').innerHTML = `
  <div class="sys-sel-grid">${sysList.map(([sn, sd]) => `<div class="sys-card ${curSys === sn ? 'active' : ''}" onclick="selectSysInProj('${sn}')"><div class="sys-card-icon">${sd.icon}</div><div class="sys-card-name">${sn}</div><div class="sys-card-sub">${sd.pools.length} pools</div></div>`).join('')}</div>
  <div class="sys-cloud-grid">${Object.values(byCloud).map((cd, i) => `
    <div class="sys-cloud-card anim" style="animation-delay:${i * 60}ms">
      <div class="sys-cloud-hd"><div class="sys-cloud-dot" style="background:${cd.color}"></div><div class="sys-cloud-name">${cd.label}</div><span style="margin-left:auto;font-size:10px;color:#a3a3a3">${cd.rows.length} pools</span></div>
      <div class="sys-cloud-body">${cd.rows.map(r => `<div class="sys-pool-row"><span class="sys-pool-id ${r.type === 'dedicated' ? 'mpid-ded' : 'mpid-shr'}">${r.id}</span><span class="sys-pool-site">${r.site}</span><span class="badge ${r.type === 'dedicated' ? 'b-ded' : 'b-shr'}" style="font-size:9px">${r.type}</span><span class="badge ${r.env === 'Prod' ? 'b-prod' : 'b-uat'}" style="font-size:9px">${r.env}</span></div>`).join('')}</div>
    </div>`).join('')}</div>`;
  }

  function selectSysInProj(s) { curSys = s; renderProjSys(); }

  /* ════════════════════════════
     ASYNC INIT
  ════════════════════════════ */
  (async () => {
    const CLOUD_LBL = { private:'私有雲', hicloud:'hiCloud', aws:'AWS' };
    const CLOUD_CLR = { private:'#2563eb', hicloud:'#0e7490', aws:'#b45309' };
    const SITE_META = {
      'tp-main': { id:'tp-main', name:'台北主中心',   region:'台北市', type:'main' },
      'tc-dr'  : { id:'tc-dr',   name:'台中異備中心', region:'台中市', type:'dr'   },
      'e7-main': { id:'e7-main', name:'東七主中心',   region:'東七區', type:'main' },
      'tw-main': { id:'tw-main', name:'台灣主中心',   region:'台灣',   type:'main' },
    };
    const SYS_ICON = { 'SYS-001':'⚡', 'SYS-002':'📱' };

    function fmtGB(gb) { return gb >= 1024 ? +(gb/1024).toFixed(1) + 'TB' : gb + 'GB'; }
    function sumVMs(vmList) {
      return vmList.reduce((a,v)=>({ cpu:a.cpu+(v.vcpu||0), mem:a.mem+(v.ram_gb||0), disk:a.disk+(v.disk_gb||0) }), {cpu:0,mem:0,disk:0});
    }

    let raw;
    try {
      ({ raw } = await DataService.loadAll());
    } catch(e) {
      console.error('資料載入失敗', e);
      document.getElementById('sv-cloud').innerHTML = '<p style="color:#dc2626;padding:20px">資料載入失敗：' + e.message + '</p>';
      return;
    }

    const projectMap = Object.fromEntries(raw.projects.map(p => [p.id, p]));
    const systemMap  = Object.fromEntries(raw.systems.map(s => [s.id, s]));

    /* ── Build POOLS ── */
    for (const pool of raw.pools) {
      const pvms = raw.vms.filter(v => v.pool_id === pool.id);
      const used = sumVMs(pvms);
      const sys  = systemMap[pool.system_id];
      const entry = {
        name : pool.name,
        type : pool.type,
        env  : pool.env,
        role : pool.site_role,
        sys  : sys?.name || pool.system_id || '—',
        cpu  : { u: used.cpu,                     t: pool.cpu_total },
        mem  : { u: used.mem,                     t: pool.mem_total_gb },
        disk : { u: +(used.disk/1024).toFixed(1), t: pool.disk_total_tb },
      };
      if (pool.type === 'dedicated') {
        entry.vms = pvms.map(v => ({
          name  : v.name,
          status: v.status,
          vcpu  : v.vcpu,
          ram   : fmtGB(v.ram_gb),
          disk  : fmtGB(v.disk_gb),
          env   : v.tags?.env || pool.env,
          ip    : v.ip || '—',
        }));
      } else {
        entry.allocs = raw.allocs.filter(a => a.pool_id === pool.id).map(a => ({
          proj      : projectMap[a.project_id]?.name || a.project_id,
          sys       : systemMap[a.system_id]?.name   || a.system_id,
          env       : a.env,
          role      : a.site_role,
          quota_cpu : a.quota_cpu + 'C',
          quota_mem : a.quota_mem_gb + 'GB',
        }));
      }
      POOLS[pool.id] = entry;
    }

    /* ── Build PROJ_DATA ── */
    for (const proj of raw.projects) {
      const pkey         = proj.code.toLowerCase();
      const projAllocs   = raw.allocs.filter(a => a.project_id === proj.id);
      const dedicatedPools = raw.pools.filter(p => p.project_id === proj.id);
      const sharedPoolIds  = [...new Set(projAllocs.map(a => a.pool_id))];
      const sharedPools    = raw.pools.filter(p => sharedPoolIds.includes(p.id));
      const allPools       = [...dedicatedPools, ...sharedPools];
      const cloudView = {}, sysView = {};
      for (const pool of allPools) {
        const ck  = pool.cloud;
        const sm  = SITE_META[pool.site_id] || { name:pool.site_id, type:'main' };
        let sysName;
        if (pool.type === 'shared') {
          const alloc = projAllocs.find(a => a.pool_id === pool.id);
          sysName = systemMap[alloc?.system_id]?.name || alloc?.system_id || '—';
        } else {
          sysName = systemMap[pool.system_id]?.name || pool.system_id || '—';
        }
        if (!cloudView[ck]) cloudView[ck] = { label:CLOUD_LBL[ck]||ck, color:CLOUD_CLR[ck]||'#0f0f0f', sites:[] };
        let site = cloudView[ck].sites.find(s => s.name === sm.name);
        if (!site) { site = { name:sm.name, type:sm.type, pools:[] }; cloudView[ck].sites.push(site); }
        site.pools.push({ id:pool.id, name:pool.name, type:pool.type, env:pool.env, role:pool.site_role, sys:sysName });
        if (!sysView[sysName]) sysView[sysName] = { icon:SYS_ICON[pool.system_id]||'🗂', pools:[] };
        sysView[sysName].pools.push({ id:pool.id, cloud:CLOUD_LBL[ck]||ck, site:sm.name, env:pool.env, role:pool.site_role, type:pool.type });
      }
      PROJ_DATA[pkey] = { name:proj.name, cloudView, sysView };
    }

    // Initial render
    renderProjView();
  })();
</script>
