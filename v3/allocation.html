<script>
// ══════════════════════════════
//  DATA — 由 DataService 載入
// ══════════════════════════════
let SHARED_POOLS = [];
let ALLOCS = [];

// Pending requests (from apply page)
let PENDING_REQS = [
  { id:'REQ-20240322-003', project:'二科', applicant:'陳美玲', created:'2024-03-22',
    systems:[
      { name:'Portal-v2', code:'SYS-PORTAL2', env:'Prod',
        mounts:[{ pool_id:'S02', est_cpu:12, est_mem:24, note:'Portal 改版需求，需與現有 Portal 隔離' }] }
    ]
  },
  { id:'REQ-20240325-004', project:'電發專案', applicant:'王大明', created:'2024-03-25',
    systems:[
      { name:'DataHub', code:'SYS-DH', env:'Prod',
        mounts:[
          { pool_id:'S01', est_cpu:10, est_mem:20, note:'資料整合平台' },
          { pool_id:'S02', est_cpu:8,  est_mem:16, note:'DR 備援用途' },
        ]
      }
    ]
  },
];

let allocModal = { poolId: null, reqId: null, draftAllocs: [] };
let pendingConfirm = null;
let allocCounter = 9;

// ══════════════════════════════
//  HELPERS
// ══════════════════════════════
function toggleSidebar() { document.getElementById('appBody').classList.toggle('sb-collapsed'); }

function getPoolUsed(poolId, resource) {
  return ALLOCS.filter(a => a.pool_id === poolId && a.status === 'active')
               .reduce((s, a) => s + (a[resource] || 0), 0);
}

function pct(u, t) { return t ? Math.min(100, Math.round(u / t * 100)) : 0; }

function barColor(p) {
  return p >= 85 ? '#dc2626' : p >= 70 ? '#d97706' : '#0d9488';
}

function capacityBar(used, total, label, unit) {
  const p = pct(used, total);
  const free = +(total - used).toFixed(1);
  const color = barColor(p);
  return `<div class="flex flex-col gap-1">
    <div class="flex justify-between items-center text-[11px]">
      <span class="text-ink-4 font-semibold">${label}</span>
      <span class="font-mono text-ink-3">${used}<span class="text-ink-4">/${total}${unit}</span></span>
    </div>
    <div class="res-track">
      <div class="res-fill" style="width:${p}%;background:${color}"></div>
    </div>
    <div class="text-[10px] text-ink-4 font-mono">剩餘 ${free}${unit} · ${p}% 已用</div>
  </div>`;
}

// ══════════════════════════════
//  TAB
// ══════════════════════════════
function switchTab(tab) {
  const isPools = tab === 'pools';
  document.getElementById('view-pools').classList.toggle('hidden', !isPools);
  document.getElementById('view-requests').classList.toggle('hidden', isPools);
  document.getElementById('tab-pools').classList.toggle('active', isPools);
  document.getElementById('tab-requests').classList.toggle('active', !isPools);
  if (isPools) renderPoolCards();
  else renderRequests();
}

// ══════════════════════════════
//  POOL CARDS
// ══════════════════════════════
function renderPoolCards() {
  const container = document.getElementById('pool-cards');
  container.innerHTML = SHARED_POOLS.map((pool, pi) => {
    const allocs = ALLOCS.filter(a => a.pool_id === pool.id && a.status === 'active');
    const usedCpu  = allocs.reduce((s,a) => s + a.cpu,  0);
    const usedMem  = allocs.reduce((s,a) => s + a.mem,  0);
    const usedDisk = allocs.reduce((s,a) => s + a.disk, 0);
    const cpuP = pct(usedCpu,  pool.cpu.t);
    const memP = pct(usedMem,  pool.mem.t);
    const dskP = pct(usedDisk, pool.disk.t);
    const hasWarn = cpuP >= 85 || memP >= 85 || dskP >= 85;

    return `<div class="bg-white border ${hasWarn ? 'border-red-m' : 'border-bord'} rounded-[10px] shadow-sm overflow-hidden anim" style="animation-delay:${pi*60}ms">

      <!-- Pool header -->
      <div class="px-5 py-4 border-b border-bord flex flex-wrap items-center gap-3">
        <div class="flex items-center gap-2.5 flex-1 min-w-0">
          <span class="font-mono text-xs font-bold px-2 py-0.5 rounded-[3px] bg-shr-l text-shr border border-shr-m flex-shrink-0">${pool.id}</span>
          <div class="min-w-0">
            <div class="text-sm font-bold text-ink truncate">${pool.name}</div>
            <div class="text-[10px] text-ink-4 font-mono">${pool.cloud} · ${pool.site}</div>
          </div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          ${hasWarn ? '<span class="text-[9px] font-bold uppercase tracking-wide px-1.5 py-0.5 rounded-[3px] border bg-red-l text-red border-red-m">容量警示</span>' : ''}
          <span class="text-[9px] font-bold uppercase tracking-wide px-1.5 py-0.5 rounded-[3px] border ${pool.env==='Prod' ? 'bg-grn-l text-grn border-grn-m' : 'bg-pur-l text-pur border-pur-m'}">${pool.env}</span>
          <span class="text-[10px] text-ink-4 font-mono">${allocs.length} allocs</span>
          <button onclick="openAllocModal('${pool.id}', null)"
            class="flex items-center gap-1 px-3 py-1.5 text-[10px] font-bold bg-shr text-white rounded-[5px] hover:bg-shr/80 transition-all flex-shrink-0">
            ＋ 新增 Allocation
          </button>
        </div>
      </div>

      <!-- Resource bars -->
      <div class="px-5 py-4 grid grid-cols-3 gap-6 border-b border-bord">
        ${capacityBar(usedCpu,  pool.cpu.t,  'CPU',  'C')}
        ${capacityBar(usedMem,  pool.mem.t,  'Mem',  'GB')}
        ${capacityBar(+(usedDisk).toFixed(1), pool.disk.t, 'Disk', 'TB')}
      </div>

      <!-- Allocation table -->
      <div class="overflow-x-auto">
        <table class="w-full text-xs border-collapse">
          <thead>
            <tr class="bg-surf-2 border-b border-bord">
              <th class="px-4 py-2.5 text-left text-[9px] font-bold uppercase tracking-[.1em] text-ink-4 whitespace-nowrap">系統</th>
              <th class="px-4 py-2.5 text-left text-[9px] font-bold uppercase tracking-[.1em] text-ink-4 whitespace-nowrap">專案</th>
              <th class="px-4 py-2.5 text-left text-[9px] font-bold uppercase tracking-[.1em] text-ink-4 whitespace-nowrap">環境</th>
              <th class="px-4 py-2.5 text-right text-[9px] font-bold uppercase tracking-[.1em] text-ink-4 whitespace-nowrap">CPU (C)</th>

function updateKPI() {
  const totalAllocs = ALLOCS.filter(a=>a.status==='active').length;
  const overCount = SHARED_POOLS.filter(pool => {
    const allocs = ALLOCS.filter(a => a.pool_id === pool.id && a.status === 'active');
    const usedCpu = allocs.reduce((s,a)=>s+a.cpu,0);
    const usedMem = allocs.reduce((s,a)=>s+a.mem,0);
    return pct(usedCpu,pool.cpu.t)>=85 || pct(usedMem,pool.mem.t)>=85;
  }).length;
  document.getElementById('kpi-allocs').textContent = totalAllocs;
  document.getElementById('kpi-pending-req').textContent = PENDING_REQS.length;
  document.getElementById('kpi-over').textContent = overCount;
  document.getElementById('pending-badge').textContent = PENDING_REQS.length;
}

function openAllocModal(poolId, allocId) {
  const pool = SHARED_POOLS.find(p => p.id === poolId);
  allocModal.poolId = poolId;
  allocModal.reqId = null;

  if (allocId) {
    // Edit mode
    const a = ALLOCS.find(x => x.id === allocId);
    allocModal.editId = allocId;
    allocModal.draftAllocs = [{ system: a.system, project: a.project, env: a.env, cpu: a.cpu, mem: a.mem, disk: a.disk }];
    document.getElementById('alloc-modal-title').textContent = `調整 Allocation — ${a.system}`;
    document.getElementById('alloc-modal-sub').textContent = `${pool.name} · ${a.project}`;
  } else {
    // Add mode
    allocModal.editId = null;
    allocModal.draftAllocs = [{ system: '', project: '', env: 'Prod', cpu: '', mem: '', disk: '' }];
    document.getElementById('alloc-modal-title').textContent = `新增 Allocation — ${pool.id}`;
    document.getElementById('alloc-modal-sub').textContent = pool.name;
  }

  renderAllocModal(pool);
  document.getElementById('alloc-modal').classList.remove('hidden');
}

function openAllocModalFromReq(reqId, sysIdx, mountIdx) {
  const req = PENDING_REQS.find(r => r.id === reqId);
  const sys = req.systems[sysIdx];
  const mount = sys.mounts[mountIdx];
  const pool = SHARED_POOLS.find(p => p.id === mount.pool_id);

  allocModal.poolId = mount.pool_id;
  allocModal.reqId = reqId;
  allocModal.sysIdx = sysIdx;
  allocModal.mountIdx = mountIdx;
  allocModal.editId = null;
  allocModal.draftAllocs = [{
    system: sys.name, project: req.project, env: sys.env,
    cpu: mount.est_cpu || '', mem: mount.est_mem || '', disk: ''
  }];

  document.getElementById('alloc-modal-title').textContent = `設定 Allocation — ${sys.name}`;
  document.getElementById('alloc-modal-sub').textContent = `申請單 ${reqId} · ${pool.name}`;

  renderAllocModal(pool);
  document.getElementById('alloc-modal').classList.remove('hidden');
}

function renderAllocModal(pool) {

  const baseMem  = otherAllocs.reduce((s,a)=>s+a.mem,0);

        </div>`;
      }).join('')}

  const draft = allocModal.draftAllocs[0];

    <div class="flex flex-col gap-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-ink-2">系統名稱 <span class="text-red">*</span></label>
          <input id="af-system" type="text" value="${draft.system}" ${isEdit?'disabled':''} placeholder="例：ERP"
            class="border border-bord rounded-[6px] px-3 py-2 text-xs bg-white transition-all ${isEdit?'bg-surf-2 text-ink-3':''}" oninput="allocModal.draftAllocs[0].system=this.value">
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-ink-2">專案</label>
          <input id="af-project" type="text" value="${draft.project}" ${isEdit?'disabled':''} placeholder="例：電發專案"
            class="border border-bord rounded-[6px] px-3 py-2 text-xs bg-white transition-all ${isEdit?'bg-surf-2 text-ink-3':''}" oninput="allocModal.draftAllocs[0].project=this.value">
        </div>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-semibold text-ink-2">環境</label>
        <div class="flex gap-3">
          <label class="flex items-center gap-1.5 cursor-pointer">
            <input type="radio" name="af-env" value="Prod" ${draft.env==='Prod'?'checked':''} onchange="allocModal.draftAllocs[0].env='Prod'" class="accent-grn">
            <span class="text-xs font-semibold text-grn">Prod</span>
          </label>
          <label class="flex items-center gap-1.5 cursor-pointer">
            <input type="radio" name="af-env" value="UAT" ${draft.env==='UAT'?'checked':''} onchange="allocModal.draftAllocs[0].env='UAT'" class="accent-pur">

          </label>
        </div>
      </div>
      <div>
        <div class="flex items-center gap-2 mb-3">
          <div class="w-[3px] h-3.5 bg-shr rounded-full"></div>
          <span class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-2">配額設定</span>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div class="flex flex-col gap-1.5">
            <label class="text-[11px] font-semibold text-ink-2">CPU <span class="text-ink-4 font-normal">(Core)</span></label>
            <input id="af-cpu" type="number" min="0" max="${freeCpu}" value="${draft.cpu}" placeholder="0"

function validateQuota(el, max, label, free, unit) {
  const val = parseFloat(el.value);
  if (!isNaN(val) && val > max) {
    el.classList.add('over-limit');
    document.getElementById('alloc-error').textContent = `${label} 超過可分配量（最多 ${free}${unit}）`;
    document.getElementById('alloc-error').classList.remove('hidden');
  } else {
    el.classList.remove('over-limit');
    document.getElementById('alloc-error').classList.add('hidden');
  }
}

function executeAlloc() {
  const pool = SHARED_POOLS.find(p => p.id === allocModal.poolId);
  const cpu  = parseFloat(document.getElementById('af-cpu').value)  || 0;
  const mem  = parseFloat(document.getElementById('af-mem').value)   || 0;
  const disk = parseFloat(document.getElementById('af-disk').value)  || 0;
  const system  = document.getElementById('af-system').value.trim();
  const project = document.getElementById('af-project').value.trim();
  const env = document.querySelector('input[name="af-env"]:checked').value;

  const err = document.getElementById('alloc-error');
  const show = msg => { err.textContent = msg; err.classList.remove('hidden'); };

  if (!system) return show('請填寫系統名稱');

  // capacity check (excluding self)
  const editId = allocModal.editId;
  const others = ALLOCS.filter(a => a.pool_id === allocModal.poolId && a.status==='active' && a.id !== editId);
  const usedCpu  = others.reduce((s,a)=>s+a.cpu,0);
  const usedMem  = others.reduce((s,a)=>s+a.mem,0);
  const usedDisk = others.reduce((s,a)=>s+a.disk,0);

  if (cpu  > 0 && usedCpu  + cpu  > pool.cpu.t)  return show(`CPU 超過 Pool 總量（${pool.cpu.t}C）`);
  if (mem  > 0 && usedMem  + mem  > pool.mem.t)  return show(`Memory 超過 Pool 總量（${pool.mem.t}GB）`);
  if (disk > 0 && usedDisk + disk > pool.disk.t) return show(`Disk 超過 Pool 總量（${pool.disk.t}TB）`);

  if (editId) {
    const a = ALLOCS.find(x => x.id === editId);
    a.cpu = cpu; a.mem = mem; a.disk = disk; a.env = env;
    DataService.updateAllocation(editId, { quota_cpu:cpu, quota_mem_gb:mem, quota_disk_tb:disk, env });
  } else {
    const newId = 'A' + String(++allocCounter).padStart(3,'0');
    const newAlloc = { id: newId, pool_id: allocModal.poolId, project, system, env, cpu, mem, disk, status:'active' };
    ALLOCS.push(newAlloc);
    DataService.createAllocation({ id:newId, pool_id:allocModal.poolId, env,
      _project: project, _system: system,
      quota_cpu:cpu, quota_mem_gb:mem, quota_disk_tb:disk, status:'active' });
    // If from request, mark mount as done
    if (allocModal.reqId) {
      const req = PENDING_REQS.find(r => r.id === allocModal.reqId);
      if (req) {
        req.systems[allocModal.sysIdx].mounts[allocModal.mountIdx]._done = true;
        // Check if all mounts done
        const allDone = req.systems.every(s => s.mounts.every(m => m._done));
        if (allDone) PENDING_REQS.splice(PENDING_REQS.findIndex(r => r.id === allocModal.reqId), 1);
      }
    }
  }

  closeAllocModal();
  renderPoolCards();
  updateKPI();
}

function closeAllocModal() { document.getElementById('alloc-modal').classList.add('hidden'); }
function handleModalBg(e) { if (e.target === document.getElementById('alloc-modal')) closeAllocModal(); }

function confirmRemoveAlloc(allocId) {
  const a = ALLOCS.find(x => x.id === allocId);
  document.getElementById('confirm-title').textContent = `移除 Allocation — ${a.system}`;
  document.getElementById('confirm-msg').textContent = `將移除「${a.system}」在此 Pool 的配額（CPU ${a.cpu}C · Mem ${a.mem}GB · Disk ${a.disk}TB），移除後系統將無法使用此 Pool 的資源。`;
  document.getElementById('confirm-ok-btn').textContent = '確認移除';
  document.getElementById('confirm-ok-btn').className = 'px-4 py-2 text-xs font-bold text-white bg-red rounded-[6px] hover:bg-red/80 transition-all';
  pendingConfirm = () => {
    ALLOCS = ALLOCS.filter(x => x.id !== allocId);
    DataService.deleteAllocation(allocId);
    renderPoolCards();
  };
  document.getElementById('confirm-modal').classList.remove('hidden');
}

function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); pendingConfirm=null; }
function doConfirm() { if(pendingConfirm) pendingConfirm(); closeConfirm(); }

    const allShrMounts = req.systems.flatMap((s,si) =>
      s.mounts.filter(m => SHARED_POOLS.find(p=>p.id===m.pool_id))
              .map((m,mi) => ({...m, sysName:s.name, sysEnv:s.env, si, mi}))
    );
    const hasDedOnly = req.systems.every(s => s.mounts.every(m => !SHARED_POOLS.find(p=>p.id===m.pool_id)));

    return `<div class="bg-white border border-bord rounded-[10px] shadow-sm overflow-hidden anim" style="animation-delay:${ri*60}ms">
      <!-- Req header -->
      <div class="px-5 py-4 border-b border-bord flex flex-wrap items-start gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-mono text-xs font-bold text-ink">${req.id}</span>
            <span class="text-[9px] font-bold uppercase tracking-wide px-1.5 py-0.5 rounded-[3px] border bg-amb-l text-amb border-amb-m">待執行</span>
          </div>
          <div class="text-xs text-ink-3 mt-1">專案：<span class="font-semibold text-ink">${req.project}</span>　申請人：${req.applicant}　${req.created}</div>
        </div>
      </div>

      <!-- Systems & mounts -->
      <div class="divide-y divide-bord">
        ${req.systems.map((sys, si) => `
          <div class="px-5 py-4">
            <div class="flex items-center gap-2 mb-3">
              <span class="text-xs font-bold text-ink">${sys.name}</span>
              <span class="font-mono text-[10px] text-ink-4">${sys.code}</span>
              <span class="text-[9px] font-bold uppercase tracking-wide px-1.5 py-0.5 rounded-[3px] border ${sys.env==='Prod'?'bg-grn-l text-grn border-grn-m':'bg-pur-l text-pur border-pur-m'}">${sys.env}</span>
            </div>
            <div class="flex flex-col gap-2">
              ${sys.mounts.map((m, mi) => {
                const pool = SHARED_POOLS.find(p=>p.id===m.pool_id);
                const isDone = m._done;
                return `<div class="flex items-start gap-3 p-3 rounded-[6px] border ${isDone ? 'border-grn-m bg-grn-l' : 'border-bord bg-surf-2'}">
                  <span class="font-mono text-[10px] font-bold px-1.5 py-0.5 rounded-[3px] border flex-shrink-0 mt-0.5 ${pool ? 'bg-shr-l text-shr border-shr-m' : 'bg-ded-l text-ded border-ded-m'}">${m.pool_id}</span>
                  <div class="flex-1 min-w-0">
                    <div class="text-xs font-semibold text-ink">${pool ? pool.name : m.pool_id}</div>
                    ${pool ? `<div class="text-[10px] text-ink-4 mt-0.5">
                      使用者預估：CPU ${m.est_cpu||'—'}C · Mem ${m.est_mem||'—'}GB
                      ${m.note ? `<span class="ml-2 italic text-ink-3">${m.note}</span>` : ''}

          /
          ${req.systems.flatMap(s=>s.mounts.filter(m=>SHARED_POOLS.find(p=>p.id===m.pool_id))).length}
          個 Shared Pool 已設定配額
        </span>
        <button onclick="checkAndExecuteReq('${req.id}')"
          class="px-4 py-1.5 text-[10px] font-bold text-white rounded-[5px] transition-all

function checkAndExecuteReq(reqId) {
  const req = PENDING_REQS.find(r => r.id === reqId);
  const shrMounts = req.systems.flatMap(s => s.mounts.filter(m => SHARED_POOLS.find(p=>p.id===m.pool_id)));
  if (!shrMounts.every(m=>m._done)) return;

  document.getElementById('confirm-title').textContent = '執行開通';
  document.getElementById('confirm-msg').textContent = `確認執行申請單「${reqId}」？開通後申請單將標記為完成，系統可開始使用已分配的資源。`;
  document.getElementById('confirm-ok-btn').textContent = '確認執行';
  document.getElementById('confirm-ok-btn').className = 'px-4 py-2 text-xs font-bold text-white bg-shr rounded-[6px] hover:bg-shr/80 transition-all';
  pendingConfirm = () => {
    PENDING_REQS.splice(PENDING_REQS.findIndex(r => r.id === reqId), 1);
    updateKPI();
    renderRequests();
  };
  document.getElementById('confirm-modal').classList.remove('hidden');
}

  const SITE_LABELS  = { 'tp-main':'台北主中心','tc-dr':'台中異備中心','e7-main':'東七主中心','tw-main':'台灣主中心' };
  try {
    const { raw } = await DataService.loadAll();

    SHARED_POOLS = raw.pools
      .filter(p => p.type === 'shared')
      .map(p => ({
        id: p.id, name: p.name,
        cloud: CLOUD_LABELS[p.cloud] || p.cloud,
        site:  SITE_LABELS[p.site_id]  || p.site_id,
        env: p.env,
        cpu:  { t: p.cpu_total },
        mem:  { t: p.mem_total_gb },
        disk: { t: p.disk_total_tb },
      }));

    allocCounter = 0;
    ALLOCS = raw.allocs.map(a => {
      const proj = raw.projects.find(p => p.id === a.project_id);
      const sys  = raw.systems.find(s => s.id === a.system_id);
      const num  = parseInt((a.id||'').replace(/\D/g,'')) || 0;
      if (num > allocCounter) allocCounter = num;
      return {
        id: a.id, pool_id: a.pool_id,
        project: proj?.name || a._project || a.project_id || '—',
        system:  sys?.name  || a._system  || a.system_id  || '—',
        env: a.env, cpu: a.quota_cpu, mem: a.quota_mem_gb,
        disk: a.quota_disk_tb, status: a.status,
      };
    });

    renderPoolCards();
  } catch(err) {
    console.error(err);
    document.getElementById('pool-cards').innerHTML =
      `<div class="text-center text-red py-12 text-sm">資料載入失敗：${err.message}</div>`;
  }
})();
</script>
</body>
</html>
